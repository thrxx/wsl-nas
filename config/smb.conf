# /etc/samba/smb.conf
# WSL2 Self-Hosted NAS Configuration
# Совместимо с Samba 4.15+ (Ubuntu 22.04 / 24.04)
# Размещать в: config/smb.conf или /etc/samba/smb.conf

[global]
   # Сеть и идентификация
   workgroup = WORKGROUP
   server string = WSL2-NAS
   netbios name = WSL-NAS
   dns proxy = no

   # Безопасность и аутентификация
   server role = standalone server
   map to guest = never
   server min protocol = SMB2_10
   restrict anonymous = 2
   obey pam restrictions = yes
   unix password sync = yes
   passwd program = /usr/bin/passwd %u
   passwd chat = *Enter\snew\s*\spassword:* %n\n *Retype\snew\s*\spassword:* %n\n *password\supdated\ssuccessfully* .
   pam password change = yes

   # Логирование
   logging = file
   log file = /var/log/samba/log.%m
   max log size = 1000
   panic action = /usr/share/samba/panic-action %d

   # Производительность (оптимизация под ext4 в WSL2)
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   aio read size = 1
   aio write size = 1
   use sendfile = true
   strict sync = no
   sync always = no
   read raw = yes
   write raw = yes

   # Отключение ненужных сервисов (экономия RAM/CPU в WSL)
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

# Основной шар
[data]
   comment = WSL NAS Primary Storage
   path = /data
   browseable = yes
   read only = no
   guest ok = no
   create mask = 0664
   directory mask = 0775
   force user = %S
   force group = %S
   
   # Автоматическое скрытие мусорных файлов ОС
   veto files = /._*/.DS_Store/Thumbs.db/desktop.ini/
   delete veto files = yes
   hide dot files = yes