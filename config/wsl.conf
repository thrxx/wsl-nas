# /etc/wsl.conf
# WSL2 Self-Hosted NAS Configuration
# Совместимо с WSL2 (Ubuntu 20.04 / 22.04 / 24.04)
# Размещать в: config/wsl.conf или /etc/wsl.conf

[boot]
# Обязательно: включает systemd как init-систему (PID 1).
# Без этого smbd/nmbd не запустятся через systemctl enable.
systemd=true

[automount]
# Автоматическое монтирование дисков Windows в /mnt/
enabled = true
# metadata: сохраняет расширенные атрибуты и права POSIX/NTFS
# umask=22, fmask=11: задаёт безопасные права по умолчанию (644 для файлов, 755 для папок)
options = "metadata,umask=22,fmask=11"
# Базовая точка монтирования Windows-дисков
root = /mnt/

[network]
# Автоматическая генерация сетевых конфигов
generateResolvConf = true
generateHosts = true
# Если планируете запускать Pi-hole/AdGuard в Docker, 
#    закомментируйте строки выше и создайте /etc/resolv.conf вручную.

[interop]
# Отключение вызова Windows-бинарников (.exe) из Linux-оболочки
# Ускоряет выполнение команд, предотвращает случайный запуск host-процессов
enabled = false
appendWindowsPath = false